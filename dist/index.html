  <div id="app">
    <header id="header">
      <h1>Artifact Visualizer</h1>

        <textarea id="content-input" placeholder="Enter markdown content..." aria-label="Markdown content editor"></textarea>
      </div>
      <div id="preview-container" class="panel" role="region" aria-label="Preview panel">
        <div id="output" aria-live="polite"></div>
      </div>
    </main>
    <footer id="footer">
      <button id="export-btn" aria-label="Export current configuration">Export</button>
      <span id="status" role="status" aria-live="polite"></span>
    </footer>
  </div>
